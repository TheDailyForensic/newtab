<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Tab</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    /* =====================================================
       BACKGROUND IMAGE — put your image file in the same
       folder as this HTML and replace 'background.jpg'
       with your filename, e.g. 'my-wallpaper.png'
       ===================================================== */
    background: #0d1117 url('_DSC0235.png') center/cover no-repeat fixed;
    font-family: 'Google Sans', 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* Dark scrim so text stays readable over any image */
  .bg-scrim {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.38);
    z-index: 0;
  }

  #rain-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .page {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 1.4rem;
    padding: 2rem;
  }



  /* Clock */
  .clock-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .clock {
    font-size: clamp(3.5rem, 9vw, 6.5rem);
    font-weight: 200;
    color: rgba(255,255,255,0.95);
    letter-spacing: -3px;
    line-height: 1;
  }
  .clock-ampm {
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    font-weight: 300;
    color: rgba(255,255,255,0.6);
    letter-spacing: 2px;
    align-self: flex-end;
    margin-bottom: 8px;
    margin-left: 6px;
  }
  .clock-row { display: flex; align-items: flex-end; }
  .date-label {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.42);
    letter-spacing: 1.5px;
    text-align: center;
  }

  /* Search */
  .search-wrap { position: relative; width: min(560px, 90vw); }
  .search-bar {
    width: 100%;
    padding: 14px 52px 14px 22px;
    border-radius: 28px;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(15,15,20,0.45);
    backdrop-filter: blur(20px);
    color: rgba(255,255,255,0.9);
    font-size: 15px;
    outline: none;
    transition: background .2s, border-color .2s, box-shadow .2s, border-radius .15s;
  }
  .search-bar::placeholder { color: rgba(255,255,255,0.32); }
  .search-bar:focus {
    background: rgba(15,15,20,0.6);
    border-color: rgba(120,170,255,0.5);
    box-shadow: 0 0 0 3px rgba(100,160,255,0.1);
  }
  .search-bar.has-suggestions {
    border-radius: 18px 18px 0 0;
    border-bottom-color: rgba(255,255,255,0.06);
  }
  .search-icon {
    position: absolute; right: 16px; top: 22px;
    color: rgba(255,255,255,0.32); cursor: pointer;
  }

  /* Suggestions dropdown */
  .suggestions {
    display: none;
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: rgba(15,15,22,0.92);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(120,170,255,0.5);
    border-top: none;
    border-radius: 0 0 18px 18px;
    overflow: hidden;
    z-index: 50;
  }
  .suggestions.open { display: block; }
  .suggestion-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 18px;
    font-size: 14px; color: rgba(255,255,255,0.78);
    cursor: pointer;
    transition: background .12s;
  }
  .suggestion-item:hover, .suggestion-item.active {
    background: rgba(255,255,255,0.08);
    color: #fff;
  }
  .suggestion-item:last-child { border-radius: 0 0 18px 18px; }
  .sug-icon { opacity: 0.4; flex-shrink: 0; }

  /* Shortcuts */
  .shortcuts { display: flex; gap: 1.1rem; flex-wrap: wrap; justify-content: center; }
  .shortcut {
    display: flex; flex-direction: column; align-items: center;
    gap: 7px; cursor: pointer; text-decoration: none;
  }
  .shortcut-icon {
    width: 56px; height: 56px; border-radius: 16px;
    background: rgba(10,12,20,0.45);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    transition: background .18s, transform .15s, box-shadow .18s;
    backdrop-filter: blur(10px);
  }
  .shortcut:hover .shortcut-icon {
    background: rgba(255,255,255,0.13);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .shortcut-label { font-size: 11px; color: rgba(255,255,255,0.55); font-weight: 400; }



  /* Gmail badge */
  .badge-wrap { position: relative; }
  .unread-badge {
    position: absolute; top: -4px; right: -4px;
    width: 18px; height: 18px; background: #EA4335;
    border-radius: 50%; font-size: 10px; font-weight: 700; color: #fff;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid rgba(0,0,0,0.5);
  }
</style>

<body>

<div class="bg-scrim"></div>
<canvas id="rain-canvas"></canvas>



<!-- Main -->
<div class="page">

  <!-- Shortcuts -->

    <!-- Google -->

          <path fill="#34A853" d="M6.3 14.7l7 5.1C15.1 16.1 19.2 13 24 13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.8 5.1 29.7 3 24 3 16 3 9.1 7.9 6.3 14.7z"/>
          <path fill="#FBBC04" d="M24 45c5.6 0 10.7-1.9 14.6-5l-6.7-5.5C29.7 36.1 27 37 24 37c-5.6 0-10.4-3.5-12-8.5l-7 5.4C8.5 40.3 15.7 45 24 45z"/>
          <path fill="#EA4335" d="M44.5 20H24v8.5h11.8c-.8 2.8-2.7 5.1-5.3 6.5l6.7 5.5c4-3.7 6.3-9.1 6.3-16 0-1.3-.1-2.7-.4-4z"/>
        </svg>

      <span class="shortcut-label">Google</span>

    <!-- YouTube -->
    <a class="shortcut" href="https://youtube.com" target="_blank">
      <div class="shortcut-icon">
        <svg width="30" height="22" viewBox="0 0 90 63"><rect width="90" height="63" rx="14" fill="#FF0000"/><polygon points="36,18 36,45 60,31.5" fill="#fff"/></svg>

    <!-- GitHub -->

      <div class="shortcut-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="rgba(255,255,255,0.85)">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>

    <!-- Instagram -->
    <a class="shortcut" href="https://instagram.com" target="_blank">
      <div class="shortcut-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <defs>
            <radialGradient id="ig" cx="30%" cy="107%" r="150%">
              <stop offset="0%" stop-color="#ffd600"/>

          <rect x="2" y="2" width="20" height="20" rx="6" fill="url(#ig)"/>
          <rect x="2" y="2" width="20" height="20" rx="6" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
          <circle cx="12" cy="12" r="4.5" stroke="#fff" stroke-width="1.6" fill="none"/>
          <circle cx="17.2" cy="6.8" r="1.1" fill="#fff"/>

    <!-- Claude -->
    <a class="shortcut" href="https://claude.ai" target="_blank">
      <div class="shortcut-icon">
        <svg width="26" height="26" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" fill="#CC9B7A" opacity="0.15"/>
          <path d="M14 30 C14 30 16 18 24 14 C32 10 36 16 34 22 C32 28 26 28 24 26 C22 24 22 20 26 18" stroke="#CC9B7A" stroke-width="2.8" stroke-linecap="round" fill="none"/>
          <path d="M34 18 C34 18 32 30 24 34 C16 38 12 32 14 26 C16 20 22 20 24 22 C26 24 26 28 22 30" stroke="#D4A574" stroke-width="2.8" stroke-linecap="round" fill="none"/>

    <!-- Calendar -->
    <a class="shortcut" href="https://calendar.google.com" target="_blank">
      <div class="shortcut-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="4" width="20" height="18" rx="2" fill="#4285F4" opacity="0.15" stroke="#4285F4" stroke-width="1.5"/>
          <path d="M2 9h20" stroke="#4285F4" stroke-width="1.5"/>
          <path d="M7 2v4M17 2v4" stroke="#4285F4" stroke-width="1.5" stroke-linecap="round"/>
          <text x="12" y="19" text-anchor="middle" font-size="7" fill="#4285F4" font-family="Arial" font-weight="700">31</text>
        </svg>
      </div>
      <span class="shortcut-label">Calendar</span>
    </a>
  </div>

</div>

<script>
// ─── LIVELY-STYLE RAIN ───────────────────────────────────────────────
const canvas = document.getElementById('rain-canvas');
const ctx = canvas.getContext('2d');

let W, H;
let streaks = [];
let drops = [];    // glass-surface droplets
let ripples = [];  // impact ripple rings

const NUM_STREAKS = 220;
const NUM_DROPS   = 55;
const WIND        = 2.8;   // slight horizontal drift

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initDrops(); });

// ── Streaks (falling rain lines) ──
function mkStreak(scattered) {
  const spd = 14 + Math.random() * 18;
  const len = 16 + Math.random() * 30;
  return {
    x: Math.random() * (W + 200) - 100,
    y: scattered ? Math.random() * H : -len,
    len, spd,
    alpha: 0.08 + Math.random() * 0.22,
    w: 0.4 + Math.random() * 0.7,
    // Lively uses a gradient: bright head fading to transparent tail
    bright: 0.9 + Math.random() * 0.1,
  };
}
function initStreaks() {
  streaks = Array.from({length: NUM_STREAKS}, () => mkStreak(true));
}
initStreaks();

// ── Glass-surface droplets (the key Lively look) ──
function mkDrop() {
  return {
    x: Math.random() * W,
    y: 20 + Math.random() * (H - 60),
    rx: 4 + Math.random() * 10,
    ry: 5 + Math.random() * 13,
    alpha: 0.18 + Math.random() * 0.32,
    life: 0.6 + Math.random() * 0.4,    // 0..1 fade
    decay: 0.0008 + Math.random() * 0.0015,
    slideY: 0,
    slideSpd: Math.random() < 0.35 ? 0.15 + Math.random() * 0.6 : 0, // some slide down
    blur: 0.5 + Math.random() * 1.5,
  };
}
function initDrops() {
  drops = Array.from({length: NUM_DROPS}, mkDrop);
}
initDrops();

// ── Ripples (ground / puddle impacts) ──
function mkRipple(x) {
  ripples.push({ x, y: H - 6, rx: 2, life: 1.0 });
}

// ── Draw a single raindrop streak with gradient ──
function drawStreak(d) {
  const x2 = d.x + WIND * (d.len / d.spd) * 4;
  const y2 = d.y + d.len;
  const grad = ctx.createLinearGradient(d.x, d.y, x2, y2);
  grad.addColorStop(0, `rgba(200,225,255,${d.alpha * d.bright})`);
  grad.addColorStop(1, `rgba(200,225,255,0)`);
  ctx.beginPath();
  ctx.moveTo(d.x, d.y);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = grad;
  ctx.lineWidth = d.w;
  ctx.stroke();
}

// ── Draw a glass-lens droplet ──
function drawGlassDrop(d) {
  const alpha = d.alpha * d.life;
  // outer edge highlight
  ctx.beginPath();
  ctx.ellipse(d.x, d.y + d.slideY, d.rx, d.ry, 0, 0, Math.PI*2);
  ctx.fillStyle = `rgba(255,255,255,${alpha * 0.18})`;
  ctx.fill();
  // inner refraction body
  ctx.beginPath();
  ctx.ellipse(d.x, d.y + d.slideY, d.rx * 0.72, d.ry * 0.72, 0, 0, Math.PI*2);
  ctx.fillStyle = `rgba(180,215,255,${alpha * 0.28})`;
  ctx.fill();
  // specular highlight (top-left glint)
  ctx.beginPath();
  ctx.ellipse(d.x - d.rx*0.28, d.y + d.slideY - d.ry*0.3, d.rx*0.22, d.ry*0.2, -0.5, 0, Math.PI*2);
  ctx.fillStyle = `rgba(255,255,255,${alpha * 0.7})`;
  ctx.fill();
  // rim stroke
  ctx.beginPath();
  ctx.ellipse(d.x, d.y + d.slideY, d.rx, d.ry, 0, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(200,230,255,${alpha * 0.35})`;
  ctx.lineWidth = 0.6;
  ctx.stroke();
}

// ── Ripple rings ──
function drawRipple(r) {
  ctx.beginPath();
  ctx.ellipse(r.x, r.y, r.rx * 3.5, r.rx * 1.0, 0, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(180,220,255,${r.life * 0.35})`;
  ctx.lineWidth = 0.7;
  ctx.stroke();
}

let frame = 0;
function animate() {
  ctx.clearRect(0, 0, W, H);
  frame++;

  // Streaks
  for (const d of streaks) {
    drawStreak(d);
    d.x += WIND;
    d.y += d.spd;
    if (d.y - d.len > H || d.x > W + 100) {
      // occasionally spawn a ripple when a streak hits the bottom
      if (d.y - d.len <= H && Math.random() < 0.4) mkRipple(d.x);
      Object.assign(d, mkStreak(false));
    }
  }

  // Glass drops
  for (let i = drops.length - 1; i >= 0; i--) {
    const d = drops[i];
    drawGlassDrop(d);
    d.slideY += d.slideSpd;
    d.life   -= d.decay;
    if (d.life <= 0 || d.y + d.slideY > H + 30) {
      drops[i] = mkDrop();
    }
  }

  // Spawn new drops occasionally
  if (frame % 18 === 0 && drops.length < NUM_DROPS + 20) drops.push(mkDrop());

  // Ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    drawRipple(r);
    r.rx  += 1.4;
    r.life -= 0.045;
    if (r.life <= 0) ripples.splice(i, 1);
  }

  // Random occasional puddle ripples
  if (frame % 40 === 0) mkRipple(Math.random() * W);

  requestAnimationFrame(animate);
}
animate();

// ─── CLOCK (12-hour) ─────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('clock').textContent = `${h}:${m}`;
  document.getElementById('ampm').textContent  = ampm;

  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('date-label').textContent =
    `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
}
updateClock();
setInterval(updateClock, 1000);

// ─── AUTOFOCUS ───────────────────────────────────────────────────────
window.addEventListener('load', () => document.getElementById('search-input').focus());

// ─── GOOGLE SUGGESTIONS ──────────────────────────────────────────────
let activeIdx = -1;
let currentSuggestions = [];
let suggestTimeout = null;

async function onSearchInput() {
  const q = document.getElementById('search-input').value.trim();
  const box = document.getElementById('suggestions');
  const bar = document.getElementById('search-input');
  if (!q) { hideSuggestions(); return; }

  clearTimeout(suggestTimeout);
  suggestTimeout = setTimeout(async () => {
    try {
      const url = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(q)}`;
      const res  = await fetch(url);
      const data = await res.json();
      const items = (data[1] || []).slice(0, 8);
      currentSuggestions = items;
      activeIdx = -1;

      if (!items.length) { hideSuggestions(); return; }

      box.innerHTML = items.map((s, i) => `
        <div class="suggestion-item" data-i="${i}" onmousedown="pickSuggestion(${i})">
          <svg class="sug-icon" width="14" height="14" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
            <path d="M16.5 16.5L21 21" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
          </svg>
          ${escHtml(s)}
        </div>`).join('');

      box.classList.add('open');
      bar.classList.add('has-suggestions');
    } catch { hideSuggestions(); }
  }, 150);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function hideSuggestions() {
  document.getElementById('suggestions').classList.remove('open');
  document.getElementById('search-input').classList.remove('has-suggestions');
  activeIdx = -1;
}

function pickSuggestion(i) {
  const q = currentSuggestions[i];
  document.getElementById('search-input').value = q;
  hideSuggestions();
  doSearch();
}

document.addEventListener('click', e => {
  if (!e.target.closest('#search-wrap')) hideSuggestions();
});

// ─── SEARCH ──────────────────────────────────────────────────────────
function handleSearch(e) {
  const box = document.getElementById('suggestions');
  const items = box.querySelectorAll('.suggestion-item');

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    activeIdx = Math.min(activeIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
    if (activeIdx >= 0) document.getElementById('search-input').value = currentSuggestions[activeIdx];
    return;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    activeIdx = Math.max(activeIdx - 1, -1);
    items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
    return;
  }
  if (e.key === 'Escape') { hideSuggestions(); return; }
  if (e.key === 'Enter') { hideSuggestions(); doSearch(); }
}
function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const url = q.startsWith('http') ? q
    : q.includes('.') ? 'https://' + q
    : 'https://www.google.com/search?q=' + encodeURIComponent(q);
  window.location.href = url;
}
function openLink(url) { window.open(url, '_blank'); }
</script>
</body>
</html>
