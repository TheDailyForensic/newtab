<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Tab</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    /* =====================================================
       BACKGROUND IMAGE — put your image file in the same
       folder as this HTML and replace 'background.jpg'
       with your filename, e.g. 'my-wallpaper.png'
       ===================================================== */
    background: #0d1117 url('background.jpg') center/cover no-repeat fixed;
    font-family: 'Google Sans', 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* Dark scrim so text stays readable over any image */
  .bg-scrim {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.38);
    z-index: 0;
  }

  #rain-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .page {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 1.4rem;
    padding: 2rem;
  }



  /* Clock */
  .clock-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .clock {
    font-size: clamp(3.5rem, 9vw, 6.5rem);
    font-weight: 200;
    color: rgba(255,255,255,0.95);
    letter-spacing: -3px;
    line-height: 1;
  }
  .clock-ampm {
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    font-weight: 300;
    color: rgba(255,255,255,0.6);
    letter-spacing: 2px;
    align-self: flex-end;
    margin-bottom: 8px;
    margin-left: 6px;
  }
  .clock-row { display: flex; align-items: flex-end; }
  .date-label {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.42);
    letter-spacing: 1.5px;
    text-align: center;
  }

  /* Search */
  .search-wrap { position: relative; width: min(560px, 90vw); }
  .search-bar {
    width: 100%;
    padding: 14px 52px 14px 22px;
    border-radius: 28px;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(15,15,20,0.45);
    backdrop-filter: blur(20px);
    color: rgba(255,255,255,0.9);
    font-size: 15px;
    outline: none;
    transition: background .2s, border-color .2s, box-shadow .2s;
  }
  .search-bar::placeholder { color: rgba(255,255,255,0.32); }
  .search-bar:focus {
    background: rgba(15,15,20,0.6);
    border-color: rgba(120,170,255,0.5);
    box-shadow: 0 0 0 3px rgba(100,160,255,0.1);
  }
  .search-icon {
    position: absolute; right: 16px; top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.32); cursor: pointer;
  }

  /* Shortcuts */
  .shortcuts { display: flex; gap: 1.1rem; flex-wrap: wrap; justify-content: center; }
  .shortcut {
    display: flex; flex-direction: column; align-items: center;
    gap: 7px; cursor: pointer; text-decoration: none;
  }
  .shortcut-icon {
    width: 56px; height: 56px; border-radius: 16px;
    background: rgba(10,12,20,0.45);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    transition: background .18s, transform .15s, box-shadow .18s;
    backdrop-filter: blur(10px);
  }
  .shortcut:hover .shortcut-icon {
    background: rgba(255,255,255,0.13);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .shortcut-label { font-size: 11px; color: rgba(255,255,255,0.55); font-weight: 400; }

  /* Account */
  .account-area { position: fixed; top: 16px; right: 20px; z-index: 100; }
  .account-btn {
    width: 38px; height: 38px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.22);
    background: linear-gradient(135deg,#4285F4,#0F9D58);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 600; color: #fff; transition: box-shadow .2s;
  }
  .account-btn:hover { box-shadow: 0 0 0 4px rgba(100,160,255,0.22); }

  .account-menu {
    position: absolute; top: 50px; right: 0; width: 300px;
    background: rgba(28,32,46,0.96);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    overflow: hidden; display: none; flex-direction: column;
    animation: menuIn .18s ease;
  }
  .account-menu.open { display: flex; }
  @keyframes menuIn {
    from { opacity:0; transform:translateY(-8px) scale(.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }
  .menu-header {
    padding: 20px 20px 14px;
    display: flex; align-items: center; gap: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .menu-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg,#4285F4,#0F9D58);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 600; color: #fff; flex-shrink: 0;
  }
  .menu-info { flex: 1; min-width: 0; }
  .menu-name { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.92); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .menu-email { font-size: 12px; color: rgba(255,255,255,0.42); margin-top: 2px; }
  .menu-manage {
    margin: 12px 20px; padding: 8px 0; text-align: center;
    border: 1px solid rgba(255,255,255,0.14); border-radius: 20px;
    font-size: 13px; color: rgba(255,255,255,0.72); cursor: pointer; transition: background .15s;
  }
  .menu-manage:hover { background: rgba(255,255,255,0.07); }
  .menu-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 4px 0; }
  .menu-item {
    display: flex; align-items: center; gap: 14px;
    padding: 11px 20px; font-size: 13px; color: rgba(255,255,255,0.68);
    cursor: pointer; transition: background .15s;
  }
  .menu-item:hover { background: rgba(255,255,255,0.06); }
  .menu-item-icon { width:20px; height:20px; display:flex; align-items:center; justify-content:center; opacity:.6; flex-shrink:0; }
  .menu-footer {
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex; justify-content: center; gap: 20px; padding: 12px 20px;

  .menu-footer a { font-size: 11px; color: rgba(255,255,255,0.32); text-decoration: none; cursor: pointer; }
  .menu-footer a:hover { color: rgba(255,255,255,0.6); text-decoration: underline; }

</style>

<script>
// ─── LIVELY-STYLE RAIN ───────────────────────────────────────────────
const canvas = document.getElementById('rain-canvas');
const ctx = canvas.getContext('2d');

let W, H;
let streaks = [];
let drops = [];    // glass-surface droplets
let ripples = [];  // impact ripple rings

const NUM_STREAKS = 220;
const NUM_DROPS   = 55;
const WIND        = 2.8;   // slight horizontal drift

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initDrops(); });

// ── Streaks (falling rain lines) ──
function mkStreak(scattered) {
  const spd = 14 + Math.random() * 18;
  const len = 16 + Math.random() * 30;
  return {
    x: Math.random() * (W + 200) - 100,
    y: scattered ? Math.random() * H : -len,
    len, spd,
    alpha: 0.08 + Math.random() * 0.22,
    w: 0.4 + Math.random() * 0.7,
    // Lively uses a gradient: bright head fading to transparent tail
    bright: 0.9 + Math.random() * 0.1,
  };
}
function initStreaks() {
  streaks = Array.from({length: NUM_STREAKS}, () => mkStreak(true));
}
initStreaks();

// ── Glass-surface droplets (the key Lively look) ──
function mkDrop() {
  return {
    x: Math.random() * W,
    y: 20 + Math.random() * (H - 60),
    rx: 4 + Math.random() * 10,
    ry: 5 + Math.random() * 13,
    alpha: 0.18 + Math.random() * 0.32,
    life: 0.6 + Math.random() * 0.4,    // 0..1 fade
    decay: 0.0008 + Math.random() * 0.0015,
    slideY: 0,
    slideSpd: Math.random() < 0.35 ? 0.15 + Math.random() * 0.6 : 0, // some slide down
    blur: 0.5 + Math.random() * 1.5,
  };
}
function initDrops() {
  drops = Array.from({length: NUM_DROPS}, mkDrop);
}
initDrops();

// ── Ripples (ground / puddle impacts) ──
function mkRipple(x) {
  ripples.push({ x, y: H - 6, rx: 2, life: 1.0 });
}

// ── Draw a single raindrop streak with gradient ──
function drawStreak(d) {
  const x2 = d.x + WIND * (d.len / d.spd) * 4;
  const y2 = d.y + d.len;
  const grad = ctx.createLinearGradient(d.x, d.y, x2, y2);
  grad.addColorStop(0, `rgba(200,225,255,${d.alpha * d.bright})`);
  grad.addColorStop(1, `rgba(200,225,255,0)`);
  ctx.beginPath();
  ctx.moveTo(d.x, d.y);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = grad;
  ctx.lineWidth = d.w;
  ctx.stroke();
}

// ── Draw a glass-lens droplet ──
function drawGlassDrop(d) {
  const alpha = d.alpha * d.life;
  // outer edge highlight
  ctx.beginPath();
  ctx.ellipse(d.x, d.y + d.slideY, d.rx, d.ry, 0, 0, Math.PI*2);
  ctx.fillStyle = `rgba(255,255,255,${alpha * 0.18})`;
  ctx.fill();
  // inner refraction body
  ctx.beginPath();
  ctx.ellipse(d.x, d.y + d.slideY, d.rx * 0.72, d.ry * 0.72, 0, 0, Math.PI*2);
  ctx.fillStyle = `rgba(180,215,255,${alpha * 0.28})`;
  ctx.fill();
  // specular highlight (top-left glint)
  ctx.beginPath();
  ctx.ellipse(d.x - d.rx*0.28, d.y + d.slideY - d.ry*0.3, d.rx*0.22, d.ry*0.2, -0.5, 0, Math.PI*2);
  ctx.fillStyle = `rgba(255,255,255,${alpha * 0.7})`;
  ctx.fill();
  // rim stroke
  ctx.beginPath();
  ctx.ellipse(d.x, d.y + d.slideY, d.rx, d.ry, 0, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(200,230,255,${alpha * 0.35})`;
  ctx.lineWidth = 0.6;
  ctx.stroke();
}

// ── Ripple rings ──
function drawRipple(r) {
  ctx.beginPath();
  ctx.ellipse(r.x, r.y, r.rx * 3.5, r.rx * 1.0, 0, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(180,220,255,${r.life * 0.35})`;
  ctx.lineWidth = 0.7;
  ctx.stroke();
}

let frame = 0;
function animate() {
  ctx.clearRect(0, 0, W, H);
  frame++;

  // Streaks
  for (const d of streaks) {
    drawStreak(d);
    d.x += WIND;
    d.y += d.spd;
    if (d.y - d.len > H || d.x > W + 100) {
      // occasionally spawn a ripple when a streak hits the bottom
      if (d.y - d.len <= H && Math.random() < 0.4) mkRipple(d.x);
      Object.assign(d, mkStreak(false));
    }
  }

  // Glass drops
  for (let i = drops.length - 1; i >= 0; i--) {
    const d = drops[i];
    drawGlassDrop(d);
    d.slideY += d.slideSpd;
    d.life   -= d.decay;
    if (d.life <= 0 || d.y + d.slideY > H + 30) {
      drops[i] = mkDrop();
    }
  }

  // Spawn new drops occasionally
  if (frame % 18 === 0 && drops.length < NUM_DROPS + 20) drops.push(mkDrop());

  // Ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    drawRipple(r);
    r.rx  += 1.4;
    r.life -= 0.045;
    if (r.life <= 0) ripples.splice(i, 1);
  }

  // Random occasional puddle ripples
  if (frame % 40 === 0) mkRipple(Math.random() * W);

  requestAnimationFrame(animate);
}
animate();

// ─── CLOCK (12-hour) ─────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('clock').textContent = `${h}:${m}`;
  document.getElementById('ampm').textContent  = ampm;

  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('date-label').textContent =
    `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
}
updateClock();
setInterval(updateClock, 1000);

// ─── ACCOUNT MENU ────────────────────────────────────────────────────
// ✏️  Edit these three lines with your info:

function toggleMenu() {
  document.getElementById('acct-menu').classList.toggle('open');
}

  if (!e.target.closest('.account-area'))
    document.getElementById('acct-menu').classList.remove('open');
});

// ─── SEARCH ──────────────────────────────────────────────────────────
function handleSearch(e) { if (e.key === 'Enter') doSearch(); }
function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const url = q.startsWith('http') ? q
    : q.includes('.') ? 'https://' + q
    : 'https://www.google.com/search?q=' + encodeURIComponent(q);
  window.location.href = url;
}
function openLink(url) { window.open(url, '_blank'); }
</script>
